name: release-manual

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (semver without leading v, e.g. 2.1.0). Leave empty to use short commit SHA as version (e.g. sha.ab12cd3)."
        required: false
        type: string

permissions:
  contents: write

jobs:
  create-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_PAT }}

      - name: Ensure RELEASE_PAT is configured
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.RELEASE_PAT }}" ]; then
            echo "Missing required secret: RELEASE_PAT"
            echo "Create a PAT with repository contents write permission and store it as RELEASE_PAT."
            exit 1
          fi

      - name: Resolve version and tag
        id: v
        shell: bash
        run: |
          set -euo pipefail
          INPUT_VERSION="${{ github.event.inputs.version }}"

          if [ -n "$INPUT_VERSION" ]; then
            # Explicit version: validate semver
            if ! [[ "$INPUT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Invalid version: '$INPUT_VERSION' — expected plain semver like 2.1.0"
              exit 1
            fi
            TAG="v${INPUT_VERSION}"
          else
            # No version: tag from short commit SHA
            SHORT_SHA=$(git rev-parse --short=7 HEAD)
            TAG="sha.${SHORT_SHA}"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"

      - name: Ensure tag does not already exist
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.v.outputs.tag }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" > /dev/null 2>&1; then
            echo "Tag '$TAG' already exists on origin. Nothing to do."
            exit 1
          fi
          echo "Tag '$TAG' is available. Proceeding to create."

      - name: Create and push tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.v.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          echo "Created and pushed tag $TAG"
